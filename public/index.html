<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generación Colegio - Reencuentro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">🎓 Generación Colegio</div>
            <div class="nav-links">
                <a href="#inicio">Inicio</a>
                <a href="#galeria">Galería</a>
                <a href="#comentarios">Comentarios</a>
                <a href="/admin" id="adminLink">📤 Carga</a>
            </div>
            <div class="user-controls">
                <!-- No hay login público, solo el enlace a admin -->
            </div>
        </nav>

        <section class="hero-section" id="inicio">
            <h1>¡Bienvenidos Generación!</h1>
            <p>Comparte tus recuerdos del colegio</p>
        </section>

        <section id="galeria">
            <h2>📸 Galería de recuerdos</h2>
            <div class="gallery-grid" id="galleryGrid">
                <div class="loading">Cargando fotos...</div>
            </div>
        </section>

        <section id="comentarios">
            <h2>💬 Comentarios destacados</h2>
            <div class="comments-list" id="commentsList">
                <div class="loading">Cargando comentarios...</div>
            </div>
        </section>
    </div>

    <script src="/js/main-simple.js"></script>
</body>
</html>
